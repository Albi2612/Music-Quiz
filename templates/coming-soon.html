<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coming Soon — Music Theory</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --green: #2a8b65;
            --bg: #f7f9f8;
            --text: #1a2330;
            --muted: #6b7280;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            text-align: center;
        }

        .container {
            background: white;
            padding: 60px 40px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            max-width: 400px;
            width: 90%;
        }

        .icon {
            font-size: 64px;
            margin-bottom: 20px;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 28px;
            margin: 0 0 16px 0;
            color: var(--text);
        }

        p {
            color: var(--muted);
            font-size: 16px;
            margin-bottom: 32px;
            line-height: 1.5;
        }

        .btn-back {
            background: var(--green);
            color: white;
            padding: 14px 32px;
            border-radius: 30px;
            text-decoration: none;
            font-weight: 600;
            font-size: 15px;
            display: inline-block;
            transition: all 0.2s;
            box-shadow: 0 4px 14px rgba(42, 139, 101, 0.25);
        }

        .btn-back:hover {
            opacity: 0.9;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="icon">🛠️</div>
        <h1>We are working on it..</h1>
        <p>This level is currently under construction. Check back soon for new questions!</p>
        <a href="/" class="btn-back">← Back to Home</a>
    </div>

</body>
</html>
